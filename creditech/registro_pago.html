<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Registrar Pago</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>

    body{
      background-color: #f4f6f9;
    }

    .card{
      border: none;
      border-radius: 20px;
    }

    .titulo{
      color: #194e9e;
      font-weight: bold;
    }

    .form-control,
    .form-select{
      border-radius: 10px;
    }

    .btn{
      border-radius: 10px;
      font-weight: bold;
    }

    .resumen{
      background-color: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
    }

    .total-box{
      background: linear-gradient(135deg, #194e9e, #1ecee6);
      color: white;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }

  </style>

</head>

<body>

<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-10">

      <div class="card shadow-lg">

        <div class="card-body p-4">

          <!-- Título -->
          <h3 class="titulo mb-4">

            <i class="bi bi-cash-coin"></i>
            Registrar Pago

          </h3>

          <!-- Datos Cliente -->
          <div class="resumen mb-4">

            <h5 class="text-primary mb-3">
              Datos del Cliente
            </h5>

            <div class="row">

              <div class="col-md-4 mb-3">

                <label class="form-label">
                  Nombre
                </label>

                <input type="text"
                class="form-control"
                value="Juan"
                readonly>

              </div>

              <div class="col-md-4 mb-3">

                <label class="form-label">
                  Apellido
                </label>

                <input type="text"
                class="form-control"
                value="Pérez"
                readonly>

              </div>

              <div class="col-md-4 mb-3">

                <label class="form-label">
                  Cédula
                </label>

                <input type="text"
                class="form-control"
                value="1234567"
                readonly>

              </div>

            </div>

          </div>

          <!-- Datos Pago -->
          <div class="row">

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Fecha de Vencimiento
              </label>

              <input type="date"
              class="form-control"
              value="2026-06-10">

            </div>

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Fecha que Pagó
              </label>

              <input type="date"
              class="form-control">

            </div>

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Monto por Cuota
              </label>

              <input type="number"
              class="form-control"
              value="250000">

            </div>

            <div class="col-md-6 mb-3">

              <label class="form-label">
                Cantidad de Cuotas
              </label>

              <select class="form-select">

                <option>1 cuota</option>
                <option selected>2 cuotas</option>
                <option>3 cuotas</option>
                <option>4 cuotas</option>

              </select>

            </div>

          </div>

          <!-- Total -->
          <div class="total-box mb-4">

            <h5>Total a Pagar</h5>

            <h2>Gs. 500.000</h2>

            <small>
              (2 cuotas x Gs. 250.000)
            </small>

          </div>

          <!-- Factura -->
          <div class="resumen mb-4">

            <h5 class="text-primary mb-3">
              Datos de Facturación
            </h5>

            <div class="row">

              <div class="col-md-4 mb-3">

                <label class="form-label">
                  Cédula / RUC
                </label>

                <input type="text"
                class="form-control"
                placeholder="Ingrese cédula o RUC">

              </div>

              <div class="col-md-4 mb-3">

                <label class="form-label">
                  Nombre
                </label>

                <input type="text"
                class="form-control"
                placeholder="Ingrese nombre">

              </div>

              <div class="col-md-4 mb-3">

                <label class="form-label">
                  Apellido
                </label>

                <input type="text"
                class="form-control"
                placeholder="Ingrese apellido">

              </div>

              <div class="col-md-12 mb-3">

                <label class="form-label">
                  Cargar Factura / Comprobante
                </label>

                <input type="file"
                class="form-control">

              </div>

            </div>

          </div>

          <!-- Observación -->
          <div class="mb-4">

            <label class="form-label">
              Observación
            </label>

            <textarea class="form-control"
            rows="3"
            placeholder="Ingrese observaciones del pago"></textarea>

          </div>

          <!-- Botones -->
          <div class="d-flex justify-content-between">

            <a href="pagos.html"
            class="btn btn-danger">

              <i class="bi bi-x-circle"></i>
              Cancelar

            </a>

            <button class="btn btn-success">

              <i class="bi bi-check-circle"></i>
              Registrar Pago

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
