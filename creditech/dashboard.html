<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CrediTech - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  .btn {
    border-radius: 12px;
    transition: all 0.3s ease;
  }

  .btn:hover {
    transform: translateX(5px);
  }
</style>
</head>

<body>

<div class="d-flex">

  <!-- Sidebar -->
 <div class="text-white p-3"
     style="width: 220px; height: 100vh;
     background: linear-gradient(135deg, #1ecee6, #194e9ec9);">
    <img src="imagenes/logo_creditech-removebg-preview.png" alt="img" height="100">
    <hr>

    <ul class="nav flex-column gap-2">

  <li class="nav-item">
    <a href="#" class="btn btn-light w-100 text-primary">
      Dashboard
    </a>
  </li>

  <li class="nav-item">
    <a href="clientes.html" class="btn btn-outline-light w-100 text-start">
      Clientes
    </a>
  </li>

  <li class="nav-item">
    <a href="credito.html" class="btn btn-outline-light w-100 text-start">
      Créditos
    </a>
  </li>

  <li class="nav-item">
    <a href="pagos.html" class="btn btn-outline-light w-100 text-start">
      Pagos
    </a>
  </li>

  <li class="nav-item mt-3">
    <a href="inicio.html" class="btn btn-danger w-100">
      Cerrar sesión
    </a>
  </li>

</ul>
  </div>

  <!-- Contenido -->
  <div class="container-fluid p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

  <h2 class="mb-0">Dashboard</h2>

  <div class="card shadow-sm border-0"
       style="border-radius: 12px; width: 190px;">

    <div class="card-body d-flex align-items-center p-2">

      <!-- Icono -->
      <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
           alt="user"
           width="30"
           class="me-2">

      <!-- Texto -->
      <div>
        <small class="text-muted">Usuario</small>
        <h6 class="mb-0" style="font-size: 14px;">
          Juan Pérez
        </h6>
      </div>

    </div>

  </div>

</div>
    <div class="row mt-4">

      <div class="col-md-3">
        <div class="card text-bg-primary">
          <div class="card-body">
            <h5>Clientes</h5>
            <p>90 registrados</p>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-bg-success">
          <div class="card-body">
            <h5>Créditos aprobados</h5>
            <p>40</p>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-bg-warning">
          <div class="card-body">
            <h5>Créditos pendientes</h5>
            <p>25</p>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-bg-danger">
          <div class="card-body">
            <h5>Créditos rechazados</h5>
            <p>25</p>
          </div>
        </div>
      </div>

    </div>

  </div>

</div>

</html>
