<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Cliente</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>

    body{
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      background: linear-gradient(135deg, #194e9e, #1ecee6);
      font-family: Arial, Helvetica, sans-serif;
    }

    .card{
      border: none;
      border-radius: 20px;
      overflow: hidden;
    }

    .card-body{
      padding: 35px;
    }

    .logo{
      width: 120px;
      margin-bottom: 15px;
    }

    .titulo{
      text-align: center;
      color: #194e9e;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .form-control{
      border-radius: 10px;
      height: 45px;
    }

    .btn{
      border-radius: 10px;
      font-weight: bold;
      padding: 10px;
      transition: 0.3s;
    }

    .btn-primary:hover{
      background-color: #0d47a1;
    }

    .btn-danger:hover{
      background-color: #b71c1c;
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="row justify-content-center">

      <div class="col-md-6">

        <div class="card shadow-lg">

          <div class="card-body">

            <!-- Logo -->
            <div class="text-center">
              <img src="imagenes/logo_creditech-removebg-preview.png"
              alt="Logo"
              class="logo">
            </div>

            <!-- Título -->
            <h3 class="titulo">
              <i class="bi bi-person-plus-fill"></i>
              Agregar Cliente
            </h3>

            <!-- Formulario -->
            <form>

              <!-- Nombre -->
              <div class="mb-3">
                <label class="form-label">Nombre</label>

                <input type="text"
                class="form-control"
                placeholder="Ingrese nombre"
                required>
              </div>

              <!-- Apellido -->
              <div class="mb-3">
                <label class="form-label">Apellido</label>

                <input type="text"
                class="form-control"
                placeholder="Ingrese apellido"
                required>
              </div>

              <!-- Cedula -->
              <div class="mb-3">
                <label class="form-label">Cédula</label>

                <input type="number"
                class="form-control"
                placeholder="Ingrese número de cédula"
                required>
              </div>

              <!-- Telefono -->
              <div class="mb-3">
                <label class="form-label">Teléfono</label>

                <input type="tel"
                class="form-control"
                placeholder="Ingrese teléfono"
                required>
              </div>

              <!-- Direccion -->
              <div class="mb-3">
                <label class="form-label">Dirección</label>

                <input type="text"
                class="form-control"
                placeholder="Ingrese dirección">
              </div>

              <!-- Email -->
              <div class="mb-4">
                <label class="form-label">Email</label>

                <input type="email"
                class="form-control"
                placeholder="Ingrese correo electrónico">
              </div>

              <!-- Botones -->
              <div class="d-flex justify-content-between">

                <a href="clientes.html"
                class="btn btn-danger w-45">
                  <i class="bi bi-x-circle"></i>
                  Cancelar
                </a>

                <button type="submit"
                class="btn btn-primary w-50">
                  <i class="bi bi-check-circle"></i>
                  Agregar Cliente
                </button>

              </div>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
