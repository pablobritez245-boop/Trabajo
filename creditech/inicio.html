<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CrediTech - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex align-items-center"
      style="height: 100vh; background: linear-gradient(135deg, #194e9ec9, #1ecee6);">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card shadow-lg border-0"
     style="background-color: rgb(255, 255, 255); border-radius: 20px;">
     
        <div class="card-body">
          <div align="center" >
          <img src="imagenes/logo_creditech-removebg-preview.png" alt="img" height="100px" align="center">

          </div>
          
          <form>
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" class="form-control" placeholder="Ingrese usuario">
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" placeholder="Ingrese contraseña">
            </div>
            
            <a href="dashboard.html" class="btn btn-primary w-100">Iniciar sesión</a>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
