<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>

    body{
      background-color: #f4f6f9;
    }

    .sidebar{
      width: 230px;
      height: 100vh;
      background: linear-gradient(135deg, #1ecee6, #194e9ec9);
    }

    .btn-menu{
      border-radius: 12px;
      transition: 0.3s;
      color: white;
      text-align: left;
    }

    .btn-menu:hover{
      transform: translateX(5px);
      background-color: rgba(255,255,255,0.2);
      color: white;
    }

    .card-user{
      border-radius: 15px;
    }

    .table{
      background-color: white;
      border-radius: 15px;
      overflow: hidden;
    }

    .btn-nuevo{
      border-radius: 10px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="d-flex">

  <!-- Sidebar -->
  <div class="sidebar text-white p-3">

    <div class="text-center">
      <img src="imagenes/logo_creditech-removebg-preview.png"
      alt="logo"
      height="100">
    </div>

    <hr>

    <div class="d-grid gap-2">

      <a href="dashboard.html"
      class="btn btn-outline-light btn-menu">
        
        Dashboard
      </a>

      <a href="#"
      class="btn btn-light btn-menu text-primary">
        
        Clientes
      </a>

      <a href="credito.html"
      class="btn btn-outline-light btn-menu">
        
        Créditos
      </a>

      <a href="pagos.html"
      class="btn btn-outline-light btn-menu">
        
        Pagos
      </a>
    

    </div>

  </div>

  <!-- Contenido -->
  <div class="container-fluid p-4">

    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4">

      <h2 class="fw-bold">
        Gestión de Clientes
      </h2>

      <!-- Usuario -->
      <div class="card shadow-sm border-0 card-user"
      style="width: 200px;">

        <div class="card-body d-flex align-items-center p-2">

          <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
          alt="user"
          width="35"
          class="me-2">

          <div>
            <small class="text-muted">Usuario</small>
            <h6 class="mb-0">Juan Pérez</h6>
          </div>

        </div>

      </div>

    </div>

    <!-- Botón -->
    <a href="agg_cliente.html"
    class="btn btn-primary btn-nuevo mb-3">

      <i class="bi bi-person-plus-fill"></i>
      Nuevo Cliente

    </a>

    <!-- Tabla -->
    <div class="table-responsive">

      <table class="table table-striped table-hover shadow-sm">

        <thead class="table-primary">

          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Cédula</th>
            <th>Teléfono</th>
            <th>Dirección</th>
            <th>Email</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>

        </thead>

        <tbody>

          <tr>

            <td>1</td>
            <td>Juan</td>
            <td>Pérez</td>
            <td>1234567</td>
            <td>0981123456</td>
            <td>San Lorenzo</td>
            <td>juan@email.com</td>

            <td>
              <span class="badge bg-success">
                Activo
              </span>
            </td>

            <td>

              <button class="btn btn-warning btn-sm">
                <i class="bi bi-pencil-fill"></i>
              </button>

              <button class="btn btn-danger btn-sm">
                <i class="bi bi-trash-fill"></i>
              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

</body>
</html>
